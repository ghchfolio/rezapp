export default "<div id=\"search\" class=\"shadow\">\r\n   <form>\r\n       <input type=\"text\" [(ngModel)]=\"term\" name=\"term\" placeholder=\"caption, company, year, project type or arsenal\" class=\"rounded\">\r\n   </form>\r\n</div>\r\n\r\n<h1 class=\"backshadow\"><i class=\"fa fa-picture-o\" aria-hidden=\"true\"></i>\r\n    <!-- <br>Gallery -->\r\n</h1>\r\n\r\n<div id=\"gallery\"> \r\n    <figure *ngFor=\"let sample of samples | searchFilter:term\">\r\n       <a class=\"backshadow\" (click)=\"navigateTo( sample.id )\"><img src=\"{{sample.src}}\" alt=\"{{sample.caption}}\" title=\"{{sample.caption}}\" class=\"thumbs shadow\">\r\n       <figcaption>{{sample.caption}}</figcaption></a>\r\n   </figure>   \r\n</div> ";
