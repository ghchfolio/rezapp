<!doctype html>
<html>
<head>
    <title>Logos Fade In/Out Version 3</title>
    <style>
        body {
           font-family: "Segoe UI", Arial, Helvetica, sans-serif;
           display: flex;
           flex-direction: column;
           justify-content: center;
           align-items: center;
        }
        body, html {
            height:90%;
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: lighter;
            text-align: center;
        }
        div {
            box-sizing: border-box;
        }
        #mainbox {
            display: flex;
            flex-wrap:wrap;
            max-width: 900px;
            margin:0 auto;
            box-shadow: 0 1em 1em #bbb;
        }
        .box {
            min-width:100px;
            height: 100px;
        }
        .fadeOutInFx {
            animation-name: fadeOutIn;
            animation-duration: 1s;
        }
        @keyframes fadeOutIn {
            0% {
                opacity:1;
            }
            50% {
                opacity:0;
            }
            100% {
                opacity: 1;
            }
        }
        .center {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Controlling CSS3 Animation with Javascript</h1>
    <p class="center">In this demo, each tile is randomly selected with a <em>fade out-in</em> animation applied.</p>

    <div id="mainbox">
        <!-- set 1 -->
        <div class="box">
